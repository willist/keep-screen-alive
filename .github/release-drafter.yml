name-template: v$RESOLVED_VERSION
tag-template: v$RESOLVED_VERSION

# PRs with any of these labels are omitted from the changelog entirely.
exclude-labels:
  - internal

categories:
  - title: Breaking changes
    label: breaking
  - title: Features
    label: feature
  - title: Fixes
    label: fix

# Auto-label merged PRs by conventional-commit prefix in the title.
# release-drafter runs this on push to main for any PRs that weren't
# labeled during review, so we don't need a separate labeling action.
autolabeler:
  - label: breaking
    title:
      - '/^[a-z]+(\(.+\))?!:/'
  - label: feature
    title:
      - '/^feat(\(.+\))?:(.+)?/'
  - label: fix
    title:
      - '/^fix(\(.+\))?:(.+)?/'
  - label: internal
    title:
      - '/^ci(\(.+\))?:(.+)?/'
      - '/^chore(\(.+\))?:(.+)?/'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
  patch:
    labels:
      - fix
  default: patch

template: |
  ## What's Changed

  $CHANGES
