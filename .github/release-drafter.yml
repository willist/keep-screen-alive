name-template: v$RESOLVED_VERSION
tag-template: v$RESOLVED_VERSION

# Auto-label PRs by conventional-commit prefix in the title.
# Applied by the autolabeler workflow on pull_request events.
autolabeler:
  - label: breaking
    title:
      - '/^[a-z]+(\(.+\))?!:/'
  - label: feature
    title:
      - '/^feat(\(.+\))?:(.+)?/'
  - label: fix
    title:
      - '/^fix(\(.+\))?:(.+)?/'
  - label: internal
    title:
      - '/^ci(\(.+\))?:(.+)?/'
      - '/^chore(\(.+\))?:(.+)?/'

# v7 schema: categories drive both changelog sections and version resolution.
# pre-exclude drops PRs from the changelog and from version resolution.
# The fallback version-resolver at the end provides the default patch bump.
categories:
  - type: pre-exclude
    when:
      label: internal
  - title: Breaking changes
    type: changelog
    semver-increment: major
    when:
      label: breaking
  - title: Features
    type: changelog
    semver-increment: minor
    when:
      label: feature
  - title: Fixes
    type: changelog
    semver-increment: patch
    when:
      label: fix
  - type: version-resolver
    semver-increment: patch

template: |
  ## What's Changed

  $CHANGES
